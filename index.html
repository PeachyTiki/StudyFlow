<title>StudyFlow</title>
<style>
:root{--bg:#0A0A0F;--card:#12121A;--card2:#1A1A25;--text:#F0F0F5;--dim:#6B6B80;--muted:#2A2A38;--acc:#7C6FFF;--acc2:#A78BFA;--ok:#44BB77;--danger:#FF5577;--rc:#FF9944;--dc:var(--acc)}
[data-theme=light]{--bg:#F5F5F7;--card:#FFF;--card2:#EEEEF2;--text:#1A1A2E;--dim:#8888A0;--muted:#D8D8E0;--acc:#6C5CE7;--acc2:#7E6EF7;--ok:#22AA66;--danger:#EE4466;--rc:#E87730;--dc:var(--acc)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Pro Display',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;min-height:100dvh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;padding-bottom:calc(72px + env(safe-area-inset-bottom,0px))}
h2{font-size:16px;font-weight:900;letter-spacing:-.3px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--muted);background:var(--card2);color:var(--text);font-family:system-ui;font-size:11px;font-weight:600;border-radius:6px;outline:none;margin-bottom:6px}
input:focus,select:focus{border-color:var(--acc)}
label{display:block;font-size:7px;font-weight:800;letter-spacing:1.2px;color:var(--dim);margin:6px 0 3px;text-transform:uppercase}
button{font-family:system-ui}
.btn{padding:8px 14px;border:none;border-radius:7px;font-size:9px;font-weight:800;cursor:pointer;letter-spacing:.5px;transition:.2s}
.bp{background:var(--acc);color:#FFF}.bp:active{opacity:.8}
.bs{background:var(--card2);color:var(--text);border:1px solid var(--muted)}
.bd{background:transparent;color:var(--danger);border:1px solid var(--danger)}
.sub{font-size:7px;font-weight:800;letter-spacing:1.8px;color:var(--dim);padding:8px 0 4px;text-transform:uppercase}
.sr{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--muted)}
.sr .lbl{font-size:10px;font-weight:700}.sr .dsc{font-size:7px;color:var(--dim);margin-top:1px}
.tog{width:36px;height:20px;border-radius:10px;background:var(--muted);position:relative;cursor:pointer;transition:.3s;flex-shrink:0}
.tog::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--dim);transition:.3s}
.tog.on{background:var(--acc)}.tog.on::after{left:18px;background:#FFF}
.opr{display:flex;gap:4px}

/* ═══ NAV BAR ═══ */
.nb{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;display:flex;background:var(--card);border-top:1px solid var(--muted);padding:6px 0 env(safe-area-inset-bottom,8px);z-index:50}
.nt{flex:1;text-align:center;padding:4px 0;cursor:pointer;transition:.2s;opacity:.4;user-select:none}
.nt.a{opacity:1}.nt .ni{font-size:18px;line-height:1}.nt .nl{font-size:7px;font-weight:700;letter-spacing:.5px;margin-top:1px}

/* ═══ TABS ═══ */
.tab{display:none;padding:8px 12px}.tab.show{display:block}

/* ═══ MODAL ═══ */
.mB{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:80;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.mB.show{opacity:1;pointer-events:auto}.mD{width:100%;max-width:430px;max-height:85vh;overflow-y:auto;background:var(--card);padding:16px;border-radius:14px 14px 0 0}
.mD h3{font-size:13px;font-weight:900;margin-bottom:10px}
.mbb{display:flex;gap:6px;margin-top:10px}
.mbb .btn{flex:1}

/* ═══ SEMESTER TABS ═══ */
.sem-tabs{display:flex;gap:2px;overflow-x:auto;padding:4px 0;scrollbar-width:none;-ms-overflow-style:none}
.sem-tabs::-webkit-scrollbar{display:none}
.sem-tab{padding:5px 12px;border-radius:6px;font-size:8px;font-weight:800;letter-spacing:.5px;cursor:pointer;white-space:nowrap;background:var(--card2);color:var(--dim);transition:.2s;flex-shrink:0}
.sem-tab.a{background:var(--acc);color:#FFF}

/* ═══ SUBJECT CARD ═══ */
.sc{background:var(--card);border-radius:9px;padding:10px 12px;margin-bottom:6px;border-left:4px solid var(--sc,var(--acc));position:relative}
.sc-name{font-size:11px;font-weight:800}.sc-meta{font-size:7px;color:var(--dim);margin-top:2px}
.sc-prog{display:flex;gap:8px;margin-top:6px}
.sc-bar{flex:1}
.sc-bar-label{font-size:6px;font-weight:700;letter-spacing:.5px;color:var(--dim);margin-bottom:2px}
.sc-bar-track{height:4px;background:var(--muted);border-radius:2px;overflow:hidden}
.sc-bar-fill{height:100%;border-radius:2px;transition:.3s}
.sc-pct{font-size:7px;font-weight:800;color:var(--dim);margin-top:1px}

/* ═══ TASK ROW ═══ */
.tr{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:7px;margin-bottom:3px}
.tr.done{opacity:.55}
.t-chk{width:18px;height:18px;border-radius:4px;border:2px solid var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#FFF;flex-shrink:0;transition:.2s}
.t-info{flex:1;min-width:0}.t-name{font-size:10px;font-weight:700}.t-sub{font-size:7px;color:var(--dim)}
.t-acts{display:flex;gap:4px;flex-shrink:0}
.t-btn{font-size:8px;cursor:pointer;opacity:.5;padding:2px}

/* ═══ HEATMAP ═══ */
.hm-grid{display:flex;gap:2px;flex-wrap:wrap;padding:4px 0}
.hm-cell{width:12px;height:12px;border-radius:2px;background:var(--muted)}
.hm-cell.l1{background:color-mix(in srgb,var(--acc) 25%,var(--muted))}.hm-cell.l2{background:color-mix(in srgb,var(--acc) 50%,var(--muted))}
.hm-cell.l3{background:color-mix(in srgb,var(--acc) 75%,var(--muted))}.hm-cell.l4{background:var(--acc)}
.grp-hdr{font-size:8px;font-weight:900;letter-spacing:1.5px;padding:10px 0 4px;text-transform:uppercase;border-bottom:1px solid var(--muted);margin-bottom:4px}

/* ═══ STUDY MODE ═══ */
.study-overlay{position:fixed;inset:0;background:var(--bg);z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:20px}
.study-timer{font-size:48px;font-weight:900;letter-spacing:-2px;font-variant-numeric:tabular-nums}
.study-subject{font-size:12px;font-weight:700;color:var(--dim);letter-spacing:1px}
.study-task{font-size:16px;font-weight:800;color:var(--acc)}

/* ═══ TODAY CARD ═══ */
.today-card{background:var(--card);border-radius:9px;padding:10px 12px;margin-bottom:6px}
.tc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.tc-title{font-size:10px;font-weight:800;color:var(--acc)}
.tc-badge{font-size:7px;font-weight:700;padding:2px 6px;border-radius:3px;background:color-mix(in srgb,var(--acc) 12%,transparent);color:var(--acc)}

/* ═══ ANALYTICS CARD ═══ */
.an-card{background:var(--card);border-radius:9px;padding:10px 12px;margin-bottom:6px}
.an-val{font-size:22px;font-weight:900;color:var(--acc)}.an-label{font-size:7px;font-weight:700;color:var(--dim);letter-spacing:.5px}

/* ═══ EXAM COUNTDOWN ═══ */
.exam-badge{font-size:7px;font-weight:800;padding:2px 6px;border-radius:3px}
.exam-badge.urgent{background:color-mix(in srgb,var(--danger) 15%,transparent);color:var(--danger)}
.exam-badge.soon{background:color-mix(in srgb,var(--rc) 15%,transparent);color:var(--rc)}
.exam-badge.ok{background:color-mix(in srgb,var(--ok) 15%,transparent);color:var(--ok)}

/* ═══ RETRO MODE ═══ */
[data-retro]{font-family:'Segoe UI',Tahoma,sans-serif!important}
[data-retro] *{border-radius:0!important}
[data-retro] .nb{border-top:2px outset #999}
[data-retro] .sc,[data-retro] .tr,[data-retro] .today-card,[data-retro] .an-card{border:2px outset #666}
[data-retro] .btn{border:2px outset #888}
[data-retro] .tog{border-radius:0!important}.tog.on{background:#44BB44}
[data-retro] input,[data-retro] select{border:2px inset #999;border-radius:0!important}
[data-retro][data-theme=dark]{--bg:#3A6EA5;--card:#1E3F6E;--card2:#15305A;--muted:#2A4A7A}
[data-retro][data-theme=light]{--bg:#D4D0C8;--card:#ECE9D8;--card2:#FFF;--muted:#ACA899;--text:#000}
[data-retro][data-theme=light] .nb{background:#ECE9D8;border-top:2px outset #FFF}
[data-retro][data-theme=light] .sc,[data-retro][data-theme=light] .tr,[data-retro][data-theme=light] .today-card,[data-retro][data-theme=light] .an-card{border:2px outset #FFF;background:#FFF}
</style></head>

const AI_PROMPT=`STUDYFLOW SETUP ASSISTANT
=============================================
You are a StudyFlow setup assistant. Your job is to collect everything needed to build a student's complete study schedule, then output a single importable JSON file.

Ask questions conversationally, one section at a time. Don't ask everything at once. Confirm details as you go. When you have everything, output ONLY the JSON — no explanation, no markdown fences, just the raw JSON object.

━━━ STEP 1 · UNIVERSITY & SEMESTER ━━━
Ask:
• University name
• Semester name (e.g. "Summer Semester 2026", "WS 2025/26")
• Semester type: summer or winter
• Semester start date and end date (YYYY-MM-DD)

━━━ STEP 2 · SUBJECTS ━━━
For each subject ask:
• Full subject name
• Subject group / department (e.g. Mathematics, Physics, Chemistry, Engineering)
• Number of lecture sessions
• Number of exercise / practical sessions
• Exam date and time (if known — leave blank if not)
• Number of past exam papers to track (e.g. 3, or 0 if none)
• Past exam names (e.g. "SS 2025", "WS 2024/25", "SS 2024")

After each subject: "Any more subjects to add?"

━━━ STEP 3 · STUDY SCHEDULE ━━━
Ask:
• Start date for studying (YYYY-MM-DD)
• How many tasks per WEEKDAY (Mon–Fri)? e.g. 2
• How many tasks per WEEKEND DAY (Sat–Sun)? e.g. 6 [tip: 3× weekday is popular]
• Hard deadline date — when everything must be done by (YYYY-MM-DD)
• Buffer: how many weeks before that deadline to finish? (e.g. 2)
• Include in schedule? → Lectures (yes/no) · Exercises (yes/no) · Past exams (yes/no)

━━━ STEP 4 · PREFERENCES ━━━
Ask:
• App language: English / German / French / Spanish / Italian / Portuguese / Dutch / Polish / Russian / Chinese / Japanese
• Typical lecture duration (hours, e.g. 1.5)
• Typical exercise / practical duration (hours, e.g. 1.5)
• Typical past exam session duration (hours, e.g. 2.5)
• Theme preference: dark or light

━━━ OUTPUT FORMAT ━━━
Output ONLY this JSON — nothing else, no code fences, no explanation:

{
  "version": 1,
  "university": "University Name",
  "semester": {
    "name": "SS 2026",
    "type": "summer",
    "year": 2026,
    "start": "2026-04-01",
    "end": "2026-09-30"
  },
  "subjects": [
    {
      "name": "Subject Name",
      "group": "Mathematics",
      "color": "#7C6FFF",
      "vCount": 6,
      "uCount": 12,
      "examDate": "2026-07-23",
      "examTime": "13:00",
      "pastExams": [
        {"name": "SS 2025", "year": "2025"},
        {"name": "WS 2024/25", "year": "2024"}
      ]
    }
  ],
  "schedule": {
    "startDate": "2026-05-01",

// ═══ SEMESTER HELPERS ═══
function semLabel(sem){const st=gSett();
if(st.hemi==='north'){return sem.type==='summer'?'SS'+sem.year.toString().slice(2):'WS'+sem.year.toString().slice(2)+(sem.year+1).toString().slice(2)}
else{return sem.type==='summer'?'S'+sem.year.toString().slice(2):'S'+(sem.year+1).toString().slice(2)}}
function getActiveSem(){const sems=gSems();if(!sems.length)return null;if(activeSem){const found=sems.find(s=>s.id===activeSem);if(found)return found}
const today=new Date(TD);const current=sems.find(s=>today>=new Date(s.start)&&today<=new Date(s.end));
if(current){activeSem=current.id;return current}activeSem=sems[sems.length-1].id;return sems[sems.length-1]}
function semSubs(semId){return gSubs().filter(s=>s.semId===semId)}

// ═══ PROGRESS HELPERS ═══
function getTask(subId,type,num){const p=gProg();return(p[subId]&&p[subId][type]&&p[subId][type][num])||{done:false,time:0}}
function setTask(subId,type,num,data){const p=gProg();if(!p[subId])p[subId]={};if(!p[subId][type])p[subId][type]={};p[subId][type][num]={...getTask(subId,type,num),...data};sProg(p)}
function toggleTask(subId,type,num){const t=getTask(subId,type,num);
if(t.done){setTask(subId,type,num,{done:false});undoCompact(subId,type,num)}
else{setTask(subId,type,num,{done:true})}
rT();rS2();rD()}
function subProgress(sub){const st=gSett(),p=gProg()[sub.id]||{};let vDone=0,vTotal=0,uDone=0,uTotal=0;
if(st.showV){vTotal=sub.vCount||0;for(let i=1;i<=vTotal;i++)if(p.v&&p.v[i]&&p.v[i].done)vDone++}
if(st.showU){uTotal=sub.uCount||0;for(let i=1;i<=uTotal;i++)if(p.u&&p.u[i]&&p.u[i].done)uDone++}
let peDone=0,peTotal=0;
if(st.showPE){peTotal=(sub.pastExams||[]).length;(sub.pastExams||[]).forEach((pe,i)=>{if(p.pe&&p.pe[i+1]&&p.pe[i+1].done)peDone++})}
return{vDone,vTotal,uDone,uTotal,peDone,peTotal,total:vTotal+uTotal+peTotal,done:vDone+uDone+peDone}}
function subStudyTime(subId){const log=gSLog();let total=0;Object.values(log).forEach(day=>{day.forEach(e=>{if(e.subId===subId)total+=e.duration||0})});return total}

const subs=semSubs(sem.id),st=gSett();
// Upcoming exams (today view only)
if(isToday){const exams=subs.filter(s=>s.examDate).map(s=>{const days=Math.ceil((new Date(s.examDate)-new Date(TD))/(864e5));return{...s,days}}).filter(x=>x.days>=0&&x.days<=30).sort((a,b)=>a.days-b.days);

// Tasks for viewed date

// ═══ STUDY MODE ═══
function startStudy(subId,type,num){const sub=gSubs().find(s=>s.id===subId);if(!sub)return;
studyActive=true;studySub=subId;studyType=type;studyNum=num;studyElapsed=0;studyStart=Date.now();
const ol=document.getElementById('studyOL');ol.style.display='flex';
studyTimer=setInterval(()=>{studyElapsed=Math.round((Date.now()-studyStart)/1000);renderStudy()},1000);
renderStudy()}
function renderStudy(){const sub=gSubs().find(s=>s.id===studySub);if(!sub)return;
const mins=Math.floor(studyElapsed/60),secs=studyElapsed%60;
const tl=typeLabel(studyType);
const ol=document.getElementById('studyOL');
ol.style.background=`color-mix(in srgb,${sub.color} 8%,var(--bg))`;
const inSession=sessionIdx>=0;
let h=`<div style="font-size:11px;font-weight:800;letter-spacing:.8px;color:${sub.color};text-align:center">${sub.name}</div>`;
if(sub.group)h+=`<div style="font-size:7px;font-weight:800;letter-spacing:1.5px;color:${sub.color};opacity:.55;text-align:center;text-transform:uppercase;margin-bottom:4px">${sub.group}</div>`;
if(inSession)h+=`<div style="font-size:7px;color:var(--dim);text-align:center;margin-bottom:4px">${sessionIdx+1} / ${sessionTasks.length}</div>`;
h+=`<div style="font-size:14px;font-weight:700;color:var(--dim);letter-spacing:.3px;text-align:center">${tl} ${studyNum}</div>`;
h+=`<div class="study-timer" style="color:${sub.color}">${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}</div>`;
h+=`<div style="display:flex;gap:8px;margin-top:24px;flex-wrap:wrap;justify-content:center">`;
if(inSession){
h+=`<button class="btn bd" onclick="endSession()" style="padding:12px 24px;font-size:11px">✕ End</button>`;
h+=`<button onclick="sessionDone()" style="padding:12px 24px;font-size:11px;background:${sub.color};color:#FFF;border:none;border-radius:7px;cursor:pointer;font-weight:800">✓ Done${sessionIdx<sessionTasks.length-1?' + Next →':''}</button>`;
if(sessionIdx<sessionTasks.length-1)h+=`<button onclick="sessionSkip()" style="padding:8px 16px;font-size:9px;background:transparent;color:var(--dim);border:1px solid var(--muted);border-radius:7px;cursor:pointer;font-weight:800">⏭ Skip</button>`;
}else{const nextN=findNextTaskNum(studySub,studyType,studyNum);
h+=`<button class="btn bd" onclick="endStudy(false)" style="padding:12px 24px;font-size:11px">✕ Cancel</button>`;
h+=`<button onclick="endStudy(true)" style="padding:12px 24px;font-size:11px;background:${sub.color};color:#FFF;border:none;border-radius:7px;cursor:pointer;font-weight:800">✓ Done</button>`;
if(nextN){const contIcon=studyType==='v'?'📖':studyType==='u'?'📝':'📄';h+=`<button onclick="continueToNext()" style="padding:6px 11px;font-size:8px;background:transparent;color:${sub.color};border:1px solid ${sub.color};border-radius:7px;cursor:pointer;font-weight:700">${contIcon} ${typeLabel(studyType)} ${nextN} →</button>`;}}
h+=`</div>`;
h+=`<div style="display:flex;gap:6px;margin-top:14px;flex-wrap:wrap;justify-content:center">`;
h+=`<button class="btn bs" onclick="exportAI('${studySub}','${studyType}',${studyNum})" style="font-size:8px;padding:6px 12px">🤖 AI Tutor</button>`;
if(sub.resourceUrl)h+=`<a href="${sub.resourceUrl}" target="_blank" class="btn bs" style="font-size:8px;padding:6px 12px;text-decoration:none;color:${sub.color};border-color:${sub.color}">📖 Resources</a>`;
h+=`</div>`;
ol.innerHTML=h}
function endStudy(save){clearInterval(studyTimer);studyActive=false;
document.getElementById('studyOL').style.display='none';
if(save){const existing=getTask(studySub,studyType,studyNum);
const addT=studyElapsed>5?studyElapsed:0;
setTask(studySub,studyType,studyNum,{done:true,time:(existing.time||0)+addT});
if(addT>0){const log=gSLog();if(!log[TD])log[TD]=[];
log[TD].push({subId:studySub,type:studyType,num:studyNum,duration:studyElapsed,start:new Date(studyStart).toTimeString().slice(0,5),end:new Date().toTimeString().slice(0,5)});
sSLog(log)}
if(sessionIdx<0){completeTaskAndCompact(studySub,studyType,studyNum);rT();rD()}}}

// ═══ CONTINUE TO NEXT + SESSION ═══
function findNextTaskNum(subId,type,num){const sub=gSubs().find(s=>s.id===subId);if(!sub)return null;
const maxN=type==='v'?sub.vCount:type==='u'?sub.uCount:(sub.pastExams||[]).length;
for(let n=num+1;n<=maxN;n++){const t=getTask(subId,type,n);if(!t.done)return n}return null}
function continueToNext(){if(studyElapsed>5){const ex=getTask(studySub,studyType,studyNum);setTask(studySub,studyType,studyNum,{time:(ex.time||0)+studyElapsed});const log=gSLog();if(!log[TD])log[TD]=[];log[TD].push({subId:studySub,type:studyType,num:studyNum,duration:studyElapsed,start:new Date(studyStart).toTimeString().slice(0,5),end:new Date().toTimeString().slice(0,5)});sSLog(log)}
const nextN=findNextTaskNum(studySub,studyType,studyNum);if(!nextN){endStudy(false);return}
studyNum=nextN;studyElapsed=0;studyStart=Date.now();renderStudy()}
function openStudySession(){const sem=getActiveSem();if(!sem)return;
const sched=gSched();const schedTasks=(sched.days&&sched.days[TD])||[];
const subs=semSubs(sem.id);const st=gSett();let tasks=[];
if(schedTasks.length){schedTasks.forEach(t2=>{const sub=subs.find(s=>s.id===t2.subId);if(!sub)return;const t=getTask(t2.subId,t2.type,t2.num);if(t.done)return;let label=typeLabel(t2.type)+' '+t2.num;if(t2.type==='pe'){const pe=(sub.pastExams||[])[t2.num-1];if(pe)label='📄 '+pe.name}tasks.push({sub,type:t2.type,num:t2.num,label})})}
if(!tasks.length){alert('No tasks for today!');return}
if((st.taskOrder||'parallel')==='parallel'){tasks.sort((a,b)=>{const ao=a.type==='v'?0:a.type==='u'?1:2;const bo=b.type==='v'?0:b.type==='u'?1:2;return ao!==bo?ao-bo:a.num-b.num})}
window._sessTasks=[...tasks];let h=`<h3>▶️ Study Session</h3>`;
h+=`<div style="font-size:8px;color:var(--dim);margin-bottom:8px">Uncheck tasks to skip. Use ▲▼ to reorder.</div>`;
h+=`<div id="sessTaskList"></div>`;
h+=`<div class="mbb"><button class="btn bs" onclick="cM()">Cancel</button><button class="btn bp" onclick="startStudySession()">▶ Start</button></div>`;
oM(h);renderSessTaskList()}
function renderSessTaskList(){const el=document.getElementById('sessTaskList');if(!el)return;
const tasks=window._sessTasks||[];let html='';
tasks.forEach((t,i)=>{html+=`<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:var(--card2);border-radius:6px;margin-bottom:3px">`;
html+=`<input type="checkbox" class="sessCB" data-i="${i}" checked style="width:auto;margin:0">`;
html+=`<div style="flex:1;min-width:0"><div style="font-size:9px;font-weight:800">${t.label}</div><div style="font-size:7px;color:${t.sub.color};overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${t.sub.name}</div></div>`;
html+=`<div style="display:flex;gap:2px"><button onclick="sessMove(${i},-1)" style="background:var(--card);border:1px solid var(--muted);border-radius:3px;cursor:pointer;font-size:9px;padding:1px 4px;color:var(--dim)">▲</button><button onclick="sessMove(${i},1)" style="background:var(--card);border:1px solid var(--muted);border-radius:3px;cursor:pointer;font-size:9px;padding:1px 4px;color:var(--dim)">▼</button></div>`;
html+=`</div>`});el.innerHTML=html}
function sessMove(i,dir){const tasks=window._sessTasks||[];const j=i+dir;if(j<0||j>=tasks.length)return;[tasks[i],tasks[j]]=[tasks[j],tasks[i]];renderSessTaskList()}
function startStudySession(){const tasks=window._sessTasks||[];const checked=Array.from(document.querySelectorAll('.sessCB:checked')).map(c=>parseInt(c.dataset.i));if(!checked.length){alert('Select at least one task');return}sessionTasks=checked.map(i=>tasks[i]);sessionIdx=0;cM();loadSessionTask()}
function loadSessionTask(){if(sessionIdx>=sessionTasks.length){endSession(true);return}const t=sessionTasks[sessionIdx];startStudy(t.sub.id,t.type,t.num)}
function sessionDone(){if(studyElapsed>5){const ex=getTask(studySub,studyType,studyNum);setTask(studySub,studyType,studyNum,{done:true,time:(ex.time||0)+studyElapsed});const log=gSLog();if(!log[TD])log[TD]=[];log[TD].push({subId:studySub,type:studyType,num:studyNum,duration:studyElapsed,start:new Date(studyStart).toTimeString().slice(0,5),end:new Date().toTimeString().slice(0,5)});sSLog(log)}else{setTask(studySub,studyType,studyNum,{done:true})}clearInterval(studyTimer);studyActive=false;sessionIdx++;loadSessionTask()}

function openSubChart(subId){
const sub=gSubs().find(s=>s.id===subId);if(!sub)return;
const fullLog=gSLog();const hmDays=getRangeDays(dataRange);
const rangeLabels={'1w':'7 days','1m':'30 days','3m':'90 days','6m':'180 days','1y':'1 year','ytd':'This year'};
// Build daily data
const data=[];
for(let i=hmDays-1;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);const dk=ds(d);
const dl=(fullLog[dk]||[]).filter(e=>e.subId===subId);
const mins=Math.round(dl.reduce((s,e)=>s+(e.duration||0),0)/60);
data.push({date:dk,mins,dl})}
const hasData=data.some(d=>d.mins>0);
// SVG dimensions
const W=340,H=180,PL=30,PT=14,PR=8,PB=26;
const CW=W-PL-PR,CH=H-PT-PB;
const n=data.length;
const maxM=Math.max(...data.map(d=>d.mins),20);
const xP=i=>PL+(n>1?i/(n-1):0.5)*CW;
const yP=v=>PT+CH-(v/maxM)*CH;
let svg=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;overflow:visible" xmlns="http://www.w3.org/2000/svg">`;
svg+=`<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${sub.color}" stop-opacity="0.28"/><stop offset="100%" stop-color="${sub.color}" stop-opacity="0.03"/></linearGradient></defs>`;
// Grid lines + y labels
for(let g=0;g<=3;g++){const gy=PT+(CH/3)*g;const gv=Math.round(maxM*(1-g/3));
svg+=`<line x1="${PL}" y1="${gy}" x2="${W-PR}" y2="${gy}" stroke="var(--muted)" stroke-width="1"/>`;
svg+=`<text x="${PL-3}" y="${gy+3}" text-anchor="end" font-size="7" fill="var(--dim)">${gv}</text>`}
if(hasData){
// Area fill
let aP=`M${xP(0)},${PT+CH}`;data.forEach((_,i)=>aP+=` L${xP(i)},${yP(data[i].mins)}`);
aP+=` L${xP(n-1)},${PT+CH} Z`;
svg+=`<path d="${aP}" fill="url(#cg)"/>`;
// Line
let lP=`M${xP(0)},${yP(data[0].mins)}`;
data.forEach((_,i)=>{if(i>0)lP+=` L${xP(i)},${yP(data[i].mins)}`});
svg+=`<path d="${lP}" fill="none" stroke="${sub.color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
// Dots (only on days with study)
const dr=n>90?2:n>30?3:4;
data.forEach((d,i)=>{if(d.mins>0){
svg+=`<circle cx="${xP(i)}" cy="${yP(d.mins)}" r="${dr}" fill="${sub.color}" stroke="var(--card)" stroke-width="2" style="cursor:pointer" onclick="showChartTip('${subId}','${d.date}')"/>`}})}
// X-axis labels
const step=Math.max(1,Math.floor(n/5));
const dNames=['Su','Mo','Tu','We','Th','Fr','Sa'];
data.forEach((d,i)=>{if(i===0||i===n-1||i%step===0){
const lbl=n<=7?dNames[new Date(d.date+'T12:00:00').getDay()]+' '+parseInt(d.date.slice(8)):d.date.slice(5);
const anchor=i===0?'start':i===n-1?'end':'middle';
svg+=`<text x="${xP(i)}" y="${H-3}" text-anchor="${anchor}" font-size="7" fill="var(--dim)">${lbl}</text>`}});
svg+=`</svg>`;
let h=`<h3 style="color:${sub.color}">${sub.name}</h3>`;
if(sub.group)h+=`<div style="font-size:7px;font-weight:800;letter-spacing:1.2px;color:${sub.color};opacity:.55;text-transform:uppercase;margin-bottom:6px">${sub.group}</div>`;
h+=`<div style="font-size:7px;color:var(--dim);margin-bottom:8px">Daily study time stacked · ${rangeLabels[dataRange]||''}</div>`;
if(!hasData){h+=`<div style="text-align:center;padding:30px 0;color:var(--dim);font-size:9px">No study sessions recorded yet</div>`}
else{h+=`<div class="an-card" style="padding:10px 8px">${svg}</div>`;
h+=`<div id="chartTipEl" style="min-height:54px;padding:8px 10px;margin-top:6px;background:var(--card2);border-radius:7px;font-size:8px;color:var(--dim)">Tap a dot to see session details</div>`}
h+=`<div class="mbb"><button class="btn bs" onclick="cM()">Close</button></div>`;
oM(h)}

function previewSchedule(semId){
const selSubs=Array.from(document.querySelectorAll('.schedSub:checked')).map(c=>c.value);
if(!selSubs.length)return alert('Select at least one subject');
const subs=gSubs().filter(s=>selSubs.includes(s.id));
const isPerExam=document.getElementById('schME').classList.contains('bp');
const isFixed=document.getElementById('schMF').classList.contains('bp');
const isEarliest=document.getElementById('schML').classList.contains('bp');
const weeksBefore=parseInt(document.getElementById('schWB').value)||2;
const fixedDate=isFixed?document.getElementById('schFD').value:'';
const inclV=document.getElementById('schInV').checked;
const inclU=document.getElementById('schInU').checked;
const inclP=document.getElementById('schInP').checked;
// Build day capacity map
const dayPlan={};document.querySelectorAll('.schDay').forEach(el=>{dayPlan[el.dataset.d]=parseInt(el.value)||0});
const totalPerWeek=Object.values(dayPlan).reduce((s,v)=>s+v,0);
if(!totalPerWeek)return alert('Set at least 1 task per week');
// Collect all undone tasks, round-robin across subjects
let allTasks=[];const prog=gProg();
function isDone(subId,type,num){const p=prog[subId];return p&&p[type]&&p[type][num]&&p[type][num].done}
// Round-robin: cycle through subjects
let taskBySub={};subs.forEach(sub=>{taskBySub[sub.id]=[];
if(inclV)for(let i=1;i<=sub.vCount;i++)if(!isDone(sub.id,'v',i))taskBySub[sub.id].push({subId:sub.id,type:'v',num:i,subName:sub.name});
if(inclU)for(let i=1;i<=sub.uCount;i++)if(!isDone(sub.id,'u',i))taskBySub[sub.id].push({subId:sub.id,type:'u',num:i,subName:sub.name});
if(inclP)(sub.pastExams||[]).forEach((pe,idx)=>{if(!isDone(sub.id,'pe',idx+1))taskBySub[sub.id].push({subId:sub.id,type:'pe',num:idx+1,subName:sub.name,peName:pe.name})})});
// Interleave: take 1 from each subject in cycle
let subIds=subs.map(s=>s.id).filter(id=>taskBySub[id].length>0);
while(subIds.length>0){let nextIds=[];
subIds.forEach(id=>{if(taskBySub[id].length>0){allTasks.push(taskBySub[id].shift());if(taskBySub[id].length>0)nextIds.push(id)}});
subIds=nextIds}
if(!allTasks.length)return alert('All tasks already done!');
// Calculate global end date
let globalEnd=null;
const examDates=subs.filter(s=>s.examDate).map(s=>new Date(s.examDate));
if(isFixed){if(!fixedDate)return alert('Select a fixed end date');globalEnd=new Date(fixedDate)}
else if(isEarliest){if(!examDates.length)return alert('No exam dates set — use fixed date mode');const earliest=new Date(Math.min(...examDates));earliest.setDate(earliest.getDate()-weeksBefore*7);globalEnd=earliest}
else{// Per Exam: prioritise tasks by each subject's own deadline; global = latest individual deadline
if(!examDates.length)return alert('No exam dates set — use fixed date mode');
const subDeadlines={};const globalFallback=new Date(Math.min(...examDates));
subs.forEach(s=>{const d=s.examDate?new Date(s.examDate):new Date(globalFallback);d.setDate(d.getDate()-weeksBefore*7);subDeadlines[s.id]=d});
// Re-sort tasks: earlier deadline subjects first, preserving round-robin within same deadline
allTasks.sort((a,b)=>subDeadlines[a.subId]-subDeadlines[b.subId]);
globalEnd=new Date(Math.max(...Object.values(subDeadlines)))}
// Count active days to deadline for min-tasks calc
let activeDays=0;const scanCursor=new Date(TD);while(ds(scanCursor)<=ds(globalEnd)){if(dayPlan[scanCursor.getDay()]>0)activeDays++;scanCursor.setDate(scanCursor.getDate()+1)}
const minPerDay=activeDays>0?Math.ceil(allTasks.length/activeDays):allTasks.length;
const weeksToDeadline=Math.max(1,Math.ceil((globalEnd-new Date(TD))/(7*864e5)));
const minPerWeek=Math.ceil(allTasks.length/weeksToDeadline);
// Assign tasks to days
const days={};let cursor=new Date(TD);let taskIdx=0;
while(taskIdx<allTasks.length){const dow=cursor.getDay();const cap=dayPlan[dow]||0;
const dk=ds(cursor);
if(cursor>globalEnd&&taskIdx<allTasks.length){for(;taskIdx<allTasks.length;taskIdx++){if(!days[dk])days[dk]=[];days[dk].push(allTasks[taskIdx])}break}
if(cap>0){if(!days[dk])days[dk]=[];for(let c=0;c<cap&&taskIdx<allTasks.length;c++){days[dk].push(allTasks[taskIdx]);taskIdx++}}
cursor.setDate(cursor.getDate()+1);if(cursor>new Date(globalEnd.getTime()+180*864e5))break}
// Show preview
const lastDay=Object.keys(days).sort().pop()||TD;
const weeksNeeded=Math.ceil(allTasks.length/Math.max(1,totalPerWeek));
let prev=`<div style="padding:8px;background:var(--card2);border-radius:6px;margin-top:6px">`;
prev+=`<div style="font-size:9px;font-weight:800;margin-bottom:4px">📊 Schedule Preview</div>`;
prev+=`<div style="font-size:8px;color:var(--dim)">• ${allTasks.length} tasks across ${subs.length} subjects</div>`;
prev+=`<div style="font-size:8px;color:var(--dim)">• ${totalPerWeek}/week → ~${weeksNeeded} weeks needed</div>`;
prev+=`<div style="font-size:8px;color:var(--dim)">• ${ds(new Date(TD))} → ${lastDay}</div>`;
prev+=`<div style="font-size:8px;color:var(--dim)">• Deadline: ${ds(globalEnd)}</div>`;
prev+=`<div style="font-size:8px;font-weight:800;color:var(--acc);margin-top:4px">📊 Min ${minPerDay}/active day · ${minPerWeek}/week to meet deadline</div>`;
if(totalPerWeek<minPerWeek)prev+=`<div style="font-size:8px;color:var(--danger);margin-top:2px">⚠️ Current rate is below minimum — you may miss the deadline</div>`;
prev+=`</div>`;
prev+=`<div class="mbb" style="margin-top:6px"><button class="btn bp" style="font-size:9px" onclick="applySchedule()">✓ Apply Schedule</button></div>`;
document.getElementById('schPreview').innerHTML=prev;
window._tempSched={config:{subs:selSubs,dayPlan,weeksBefore,generated:TD,startDate:TD,inclV,inclU,inclP},days}}

function applySchedule(){if(!window._tempSched)return;
const sched=window._tempSched;sSched(sched);
cM();alert('Schedule generated! Check Today tab.');rT();rS2()}

const newTasks=[];
if(inclU){for(let i=1;i<=sub.uCount;i++){const t=getTask(subId,'u',i);if(!t.done){const inSched=Object.values(sched.days).some(day=>day.some(t2=>t2.subId===subId&&t2.type==='u'&&t2.num===i));if(!inSched)newTasks.push({subId,type:'u',num:i})}}}
if(inclP){(sub.pastExams||[]).forEach((_,idx)=>{const t=getTask(subId,'pe',idx+1);if(!t.done){const inSched=Object.values(sched.days).some(day=>day.some(t2=>t2.subId===subId&&t2.type==='pe'&&t2.num===idx+1));if(!inSched)newTasks.push({subId,type:'pe',num:idx+1})}})}
if(!newTasks.length)return;
const futureDays=Object.entries(sched.days).filter(([d,tasks])=>d>=TD&&tasks.length>0).sort(([a],[b])=>a<b?-1:1);
if(!futureDays.length)return;
let di=0;newTasks.forEach(task=>{futureDays[di%futureDays.length][1].push(task);di++});
sSched(sched)}
function applyWkndMult(){const mult=parseFloat(document.getElementById('schWknd')?.value)||3;const st=gSett();st.wkndMult=mult;sSett(st);const weekdayEls=Array.from(document.querySelectorAll('.schDay')).filter(el=>el.dataset.d!=='0'&&el.dataset.d!=='6');const avg=weekdayEls.length?Math.round(weekdayEls.reduce((s,el)=>s+(parseInt(el.value)||0),0)/weekdayEls.length):3;const wkndVal=Math.max(1,Math.round(avg*mult));document.querySelectorAll('.schDay').forEach(el=>{if(el.dataset.d==='0'||el.dataset.d==='6')el.value=wkndVal})}

function rolloverMissed(){const sched=gSched();if(!sched.config||!sched.days)return;
const startDate=sched.config.startDate||'2000-01-01';
if(TD<startDate)return;
const days=sched.days;let changed=false;
const pastDays=Object.keys(days).filter(d=>d<TD).sort();
let carryOver=[];
pastDays.forEach(d=>{
if(d<startDate){delete days[d];changed=true;return;}
const tasks=days[d]||[];
tasks.forEach(t=>{const prog=gProg();const done=prog[t.subId]&&prog[t.subId][t.type]&&prog[t.subId][t.type][t.num]&&prog[t.subId][t.type][t.num].done;
if(!done){carryOver.push(t)}});
delete days[d];changed=true});
// Add carry-over to today
if(carryOver.length){if(!days[TD])days[TD]=[];
// Deduplicate (don't add if already scheduled today)
carryOver.forEach(t=>{const exists=days[TD].some(e=>e.subId===t.subId&&e.type===t.type&&e.num===t.num);
if(!exists)days[TD].push(t)});
changed=true}
if(changed){sched.days=days;sSched(sched)}}

function skipTask(subId,type,num){const sched=gSched();if(!sched.days)return;
// Remove from today
if(sched.days[TD]){sched.days[TD]=sched.days[TD].filter(t=>!(t.subId===subId&&t.type===type&&t.num===num))}
// Pull next undone task of same type for today (replace skipped slot)
const sub=gSubs().find(s=>s.id===subId);
if(sub){const maxN=type==='v'?sub.vCount:type==='u'?sub.uCount:(sub.pastExams||[]).length;
for(let n=num+1;n<=maxN;n++){const t=getTask(subId,type,n);if(!t.done){const alreadyToday=(sched.days[TD]||[]).some(x=>x.subId===subId&&x.type===type&&x.num===n);if(!alreadyToday){if(!sched.days[TD])sched.days[TD]=[];sched.days[TD].unshift({subId,type,num:n})}break}}}
// Put skipped task FIRST for tomorrow
const tmrw=new Date(TD);tmrw.setDate(tmrw.getDate()+1);const tmrwKey=ds(tmrw);
if(!sched.days[tmrwKey])sched.days[tmrwKey]=[];
const exists=sched.days[tmrwKey].some(t=>t.subId===subId&&t.type===type&&t.num===num);
if(!exists)sched.days[tmrwKey].unshift({subId,type,num});
sSched(sched);rT()}

// ═══ AHEAD-OF-SCHEDULE COMPLETION ═══
// Called when study-mode "Done" is clicked. If the task was in a future slot,
// remove it from there, pull the first task from the next day to fill the gap,
// and add it to today's list so it stays visible (and undo-able via untick).
function completeTaskAndCompact(subId,type,num){
const sched=gSched();if(!sched.days)return;
// If already in today's slot → nothing to rearrange
if((sched.days[TD]||[]).some(t=>t.subId===subId&&t.type===type&&t.num===num))return;
// Find in a future slot
const futureDates=Object.keys(sched.days).filter(d=>d>TD).sort();
let origDate=null,origIdx=-1;
for(const d of futureDates){const idx=(sched.days[d]||[]).findIndex(t=>t.subId===subId&&t.type===type&&t.num===num);if(idx>=0){origDate=d;origIdx=idx;break}}
if(!origDate)return; // not scheduled anywhere future — nothing to do
// Find what we'll pull in to fill the gap (first task of next non-empty day)
let pulledTask=null,pulledFromDate=null;
for(const d of futureDates){if(d>origDate&&sched.days[d]&&sched.days[d].length>0){pulledFromDate=d;pulledTask={...sched.days[d][0]};break}}
// Store undo info
const key=`${subId}_${type}_${num}`;
const moved=gMoved();moved[key]={origDate,origIdx,pulledTask,pulledFromDate};sMoved(moved);
// Remove from its slot
sched.days[origDate].splice(origIdx,1);
// Pull replacement task from next day
if(pulledTask&&pulledFromDate){
  sched.days[pulledFromDate]=sched.days[pulledFromDate].slice(1);
  sched.days[origDate].push(pulledTask);
  if(sched.days[pulledFromDate].length===0)delete sched.days[pulledFromDate];
}
if(sched.days[origDate]&&sched.days[origDate].length===0)delete sched.days[origDate];
// Add to today so it shows as done (user can untick if accidental)
if(!sched.days[TD])sched.days[TD]=[];
if(!sched.days[TD].some(t=>t.subId===subId&&t.type===type&&t.num===num))sched.days[TD].push({subId,type,num});
sSched(sched)}

// Reverses a completeTaskAndCompact: puts the task back in its original slot,
// un-pulls the replacement task, removes from today's list.
function undoCompact(subId,type,num){
const key=`${subId}_${type}_${num}`;
const moved=gMoved();const entry=moved[key];
if(!entry)return; // was a normal today-task tick — no schedule undo needed
const sched=gSched();if(!sched.days)return;
// Remove from today's list
if(sched.days[TD]){sched.days[TD]=sched.days[TD].filter(t=>!(t.subId===subId&&t.type===type&&t.num===num));if(sched.days[TD].length===0)delete sched.days[TD]}
// Un-pull: move replacement task back to its original day
if(entry.pulledTask&&entry.pulledFromDate){
  if(sched.days[entry.origDate]){sched.days[entry.origDate]=sched.days[entry.origDate].filter(t=>!(t.subId===entry.pulledTask.subId&&t.type===entry.pulledTask.type&&t.num===entry.pulledTask.num))}
  if(!sched.days[entry.pulledFromDate])sched.days[entry.pulledFromDate]=[];
  sched.days[entry.pulledFromDate].unshift(entry.pulledTask);
}
// Restore original task to its slot
if(!sched.days[entry.origDate])sched.days[entry.origDate]=[];
sched.days[entry.origDate].splice(entry.origIdx,0,{subId,type,num});
sSched(sched);
delete moved[key];sMoved(moved)}
